name: Unit Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_medical_warehouse
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run dbt tests
      run: |
        cd medical_warehouse
        dbt deps
        dbt test
      env:
        DB_HOST: localhost
        DB_PORT: 5432
        DB_NAME: test_medical_warehouse
        DB_USER: postgres
        DB_PASSWORD: postgres

    - name: Run Python tests
      run: |
        pytest tests/ -v
      env:
        DB_HOST: localhost
        DB_PORT: 5432
        DB_NAME: test_medical_warehouse
        DB_USER: postgres
        DB_PASSWORD: postgres
