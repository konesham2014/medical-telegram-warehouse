
# Name your project! Project names should contain only lowercase characters
# and underscores. A good package name should reflect your organization's
# name or the intended use of these models
name: 'medical_warehouse'
version: '1.0.0'
config-version: 2

# This setting configures which "profile" dbt uses for this project.
profile: 'medical_warehouse'

# These configurations specify where dbt should look for different types of files.
# The `source-paths` config, for example, states that models in this directory can be
# referenced as `source()` in SQL files.
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

# Target path for compiled SQL files
target-path: "target"

# Directories to be removed by `dbt clean`
clean-targets:
  - "target"
  - "dbt_packages"

# Configuring models
# Full documentation: https://docs.getdbt.com/docs/configuring-models
models:
  medical_warehouse:
    # Staging models - raw data cleaned and standardized
    staging:
      +materialized: view
      +schema: staging

    # Mart models - business-ready dimensional models
    marts:
      +materialized: table
      +schema: marts
